<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>admin</title>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"></script>
   <style>
      * {
         font-family: sans-serif;
         margin: 0;
         padding: 0;
         box-sizing: border-box;
      }

      header {
         display: flex;
         justify-content: space-between;
         background-color: #c7c9c9;
         height: 8vh;
         padding: 15px 10px 0px;
      }

      .innerbox {
         text-align: center;
         margin-top: 13px;
         width: fit-content;
         height: auto;
      }

      /* .name {
               padding-right: 11vw;
               padding-bottom: 18px;
               border-bottom: ridge;
            }
      
            .age {
               padding-right: 3vw;
               padding-bottom: 18px;
               background-color: #e1e1e1;
               border-bottom: ridge;
            }
      
            .state {
               padding-right: 15vw;
               padding-bottom: 18px;
               border-bottom: ridge;
            } */

      .functioncol {
         width: 200px;
         /* height: 6vh; */
         text-align-last: start;
         border-bottom: ridge;
         padding: 4px 0px 0px 0px;
      }

      .operationblue {
         background-color: #0dcaf0;
         padding: 10px 0px;
         /* width: 50%; */
         /* height: 4vh; */
         width: 96px;
         text-align-last: center;
         cursor: pointer;
      }

      .operationred {
         padding: 10px 0px;
         background-color: rgb(245, 94, 74);
         ;
         /* width: 50%; */
         /* height: 4vh; */
         width: 96px;
         text-align-last: center;
         cursor: pointer;
      }

      .adduser {
         display: none;
         margin-top: 10px;
      }

      .adduser input,
      select {
         width: 25%;
         margin-bottom: 6px;
         border-radius: 5px;
         height: 3vh;
      }

      span {
         display: table-cell;

         /* width: 100px; */
         /* padding: 6px 20px; */
      }

      /* colunmn style */

      .agecol {
         width: 3rem;
         height: 6vh;
         text-align-last: start;
         border-bottom: ridge;
         padding: 4px 0px 0px 4px;
      }

      .dobcol {
         width: 7rem;
         height: 6vh;
         text-align-last: start;
         border-bottom: ridge;
         padding: 4px 0px 0px 4px;
      }

      .langcol {
         width: 12rem;
         height: 6vh;
         text-align-last: start;
         border-bottom: ridge;
         padding: 4px 0px 0px 4px;
      }

      .namecol {
         width: 12rem;
         height: 6vh;
         text-align-last: start;
         border-bottom: ridge;
         padding: 4px 0px 0px 4px;
      }

      .phonecol {
         width: 7rem;
         height: 6vh;
         text-align-last: start;
         border-bottom: ridge;
         padding: 4px 0px 0px 4px;
      }

      .emailcol {
         width: 15rem;
         height: 6vh;
         text-align-last: start;
         border-bottom: ridge;
         padding: 4px 0px 0px 4px;
      }

      .addcol {
         width: 10rem;
         height: 6vh;
         text-align-last: start;
         border-bottom: ridge;
         padding: 4px 0px 0px 4px;
      }

      /* columns style */

      .menu button {
         border: none;
         background: none;
         cursor: pointer;
      }

      .operationeditblue {
         cursor: pointer;
         width: 63px;
         text-align-last: center;
         background-color: #0dcaf0;
      }

      .operationeditred {
         cursor: pointer;
         width: 63px;
         text-align-last: center;
         background-color: rgb(245, 94, 74);
         ;
      }

      .operationeditok {
         cursor: pointer;
         width: 63px;
         text-align-last: center;
         background-color: #52c452;
         ;
      }


      /* demo */
      body {
         margin: 0;
         padding: 0;
         background-position: center;
         font-family: sans-serif
      }

      .loginbox {
         width: 320px;
         height: 430px;
         background:
            #000;
         color: #fff;
         top: 50%;
         left: 50%;
         position: absolute;
         transform: translate(-50%, -50%);
         box-sizing:
            border-box;
         padding: 70px 30px;
         border-radius: 53px;
      }

      .avatar {
         width: 100px;
         height: 100px;
         border-radius: 50%;
         position: absolute;
         top:
            -50px;
         left: calc(50% - 50px)
      }

      h1 {
         margin: 0;
         padding: 0 0 20px;
         text-align: center;
         font-size: 22px
      }

      .loginbox p {
         margin:
            0;
         padding: 0;
         font-weight: bold
      }

      .loginbox input {
         width: 100%;
         margin-bottom: 20px
      }

      .loginbox input[type="text"],
      input[type="password"] {
         border: none;
         border-bottom: 1px solid #fff;
         background: transparent;
         outline: none;
         height:
            40px;
         color: #fff;
         font-size: 16px
      }

      .loginbox input[type="submit"] {
         border: none;
         outline: none;
         height: 40px;
         background:
            #fb2525;
         color: #fff;
         font-size: 18px;
         border-radius: 20px
      }

      .loginbox input[type="submit"]:hover {
         cursor:
            pointer;
         background: #ffc107;
         color: #000
      }

      .loginbox a {
         text-decoration: none;
         font-size: 12px;
         line-height: 20px;
         color:
            darkgrey
      }

      .loginbox a:hover {
         color: #ffc107
      }

      /* table style */
      .testTableDataStu,
      .testTableHeaderStu {
         padding: 6px;
         text-align: center;
         text-wrap: pretty;

      }

      .studentTestTable thead {
         position: sticky;
         background: #ebebeb;
         top: 0px;
         height: 7vh;
         border-radius: 4px;
         cursor: pointer;
      }


      .studentTestTable {
         box-shadow: 0px 0px 13px 0px rgb(148 145 145 / 70%);
      }

      #studentTableCont {
         height: 85vh;
         scroll-behavior: smooth;
         overflow-y: scroll;
      }

      .studentTestTable,
      .leaveRequestTable {
         width: 95%;
         margin-inline: auto;
         margin-top: 25px;
         border-collapse: collapse;
         font-family: arial, sans-serif;
      }

      .leaveRequestTable {
         margin-top: 75px;
      }

      .testTableData,
      .testTableHeader {
         padding: 8px;
         border: 1px solid #dddddd;
         text-align: center !important;
      }

      .testTableRow:nth-child(even) {
         background-color: #f8f8f8;
      }

      .completed,
      .testTableRow:nth-child(odd) {
         background-color: #ffffff;
      }

      th,
      td {
         /* border: 1px solid black; */
         padding: 20px;
         /* Optional: Add padding to cells for better visualization */
      }


      .start {
         margin-inline: auto;
         padding: 5px 10px;
         border: none;
         border-radius: 50px;
         background-color: rgb(245, 94, 74);
      }

      .edit {
         margin-inline: auto;
         padding: 5px;
         border: none;
         border-radius: 14px;
         background-color: #0dcaf0;
      }

      .save {
         margin-inline: auto;
         padding: 5px;
         border: none;
         border-radius: 14px;
         background-color: #52c452;
      }
   </style>

</head>

<body style="text-align: center;">
   <div id="mainbody">
      <header>
         <div>
            ADMIN
         </div>
         <div class="menu" style="display: flex;margin-top: -1rem;">

            <!-- app interface -->
            <button type="button" class="btn btn-light app-btn" id="show_appointment_btn"
               onclick="appointment_Interface()">Appointments</button>


            <!-- user management -->
            <button type="button" class="btn btn-light mangement-btn" id="show_user_btn"
               onclick="admin_Interface()">Users</button>

            <button onclick="logout()"><i class="fa fa-sign-out" aria-hidden="true"></i></button>

         </div>
      </header>

      <div id="appointment_cont" style="text-align: center;margin-top: 13px;display: none;">

         <!-- Button trigger modal -->
         <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop1"
            style="margin-left: 89%;">
            Add New
         </button>

         <!-- Modal -->
         <div class="modal fade" id="staticBackdrop1" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
            aria-labelledby="staticBackdropLabel" aria-hidden="true">
            <div class="modal-dialog">
               <div class="modal-content">
                  <div class="modal-header">
                     <h5 class="modal-title" id="staticBackdropLabel">APPOINTMENT FORM</h5>
                     <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                  </div>
                  <div class="modal-body">

                     <form id="appointment_form">
                        <div class="row g-3">
                           <div class="col-md-6">
                              <input type="text" name="name" class="form-control" placeholder="First Name" required>
                           </div>
                           <div class="col-md-6">
                              <input type="tel" name="phone" class="form-control" placeholder="Phone Number" required>
                           </div>
                           <div class="col-md-6">
                              <input type="email" name="email" class="form-control" placeholder="Enter Email" required>
                           </div>
                           <div class="col-md-6">
                              <input type="text" name="address" class="form-control" placeholder="Address" required>
                           </div>
                           <div class="col-md-6">
                              <input type="date" name="date" class="form-control" placeholder="Enter Date" required>
                           </div>
                           <div class="col-md-6">
                              <select name="time" class="form-select" style="height: fit-content;" required>
                                 <option value="" selected>Select Time</option>
                                 <option value="10:00AM">10:00AM</option>
                                 <option value="10:30AM">10:30AM</option>
                                 <option value="11:00AM">11:00AM</option>
                                 <option value="11:30AM">11:30AM</option>
                                 <option value="12:00AM">12:00AM</option>
                                 <option value="01:30PM">01:30PM</option>
                                 <option value="02:00PM">02:00PM</option>
                                 <option value="02:30PM">02:30PM</option>
                                 <option value="03:00PM">03:00PM</option>
                              </select>
                           </div>
                           <div class="col-12">
                              <select name="doctor" class="form-select" style="height: fit-content;" required>
                                 <option value="" selected>Doctor</option>
                                 <option value="DrSarahJohnson-Cardiology">Dr. Sarah Johnson - Cardiology</option>
                                 <option value="DrMichaelSmith-Dermatology">Dr. Michael Smith - Dermatology</option>
                                 <option value="DrEmilyDavis-Endocrinology">Dr. Emily Davis - Endocrinology</option>
                                 <option value="DrJamesRodriguez-Gastroenterology">Dr. James Rodriguez -
                                    Gastroenterology</option>
                                 <option value="DrAmandaWhite-Hematology">Dr. Amanda White - Hematology</option>
                                 <option value="DrChristopherBrown-Neurology">Dr. Christopher Brown - Neurology</option>
                                 <option value="DrJenniferTaylor-OBGYN">Dr. Jennifer Taylor - Obstetrics/Gynecology
                                 </option>
                                 <option value="DrBrianMiller-Ophthalmology">Dr. Brian Miller - Ophthalmology</option>

                              </select>
                           </div>
                           <div class="col-12">
                              <textarea name="message" class="form-control" placeholder="Message" required></textarea>
                           </div>
                           <div class="col-12 mt-5">
                              <button type="button" id="closeAppointmentBtn" class="btn btn-secondary" data-bs-dismiss="modal"
                                 onclick="clearform()" style="margin-left: 46%;">Clear</button>
                              <button type="submit" id="book_button" class="btn btn-primary float-end">Book
                                 Appointment</button>
                           </div>
                        </div>
                     </form>

                  </div>
               </div>
            </div>
         </div>

         <table class="studentTestTable" id="studentTestTable">
            <thead>
               <tr class="testTableRowHeader">
                  <th class="testTableHeaderStu">Name</th>
                  <th class="testTableHeaderStu">Date</th>
                  <th class="testTableHeaderStu">Time</th>
                  <th class="testTableHeaderStu">Phone</th>
                  <th class="testTableHeaderStu">Email</th>
                  <th class="testTableHeaderStu">doctor</th>
                  <th class="testTableHeaderStu">Message</th>
                  <th class="testTableHeaderStu">Address</th>
                  <th class="testTableHeaderStu">Cancel</th>
                  <th class="testTableHeaderStu">Edit</th>
               </tr>
            </thead>

            <tbody id="stu-table-body">

            </tbody>
         </table>
      </div>

      <div id="innerbox" style="text-align: center;margin-top: 13px;display: none;">


         <!-- Button trigger modal -->
         <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop2"
            style="margin-left: 89%;">
            Add User
         </button>

         <!-- Modal -->
         <div class="modal fade" id="staticBackdrop2" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
            aria-labelledby="staticBackdropLabel" aria-hidden="true">
            <div class="modal-dialog">
               <div class="modal-content">
                  <div class="modal-header">
                     <h5 class="modal-title" id="staticBackdropLabel">USER FORM</h5>
                     <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                  </div>
                  <div class="modal-body">

                     <form id="addUserForm">
                        <div class="row g-3">
                           <div class="col-md-6">
                              <input type="text" name="username" class="form-control" placeholder="Name" required>
                           </div>
                           <div class="col-md-6">
                              <input type="number" name="age" class="form-control" placeholder="Age" required>
                           </div>
                           <div class="col-md-6">
                              <input type="date" name="dob" class="form-control" placeholder="Date of Birth" required>
                           </div>
                           <div class="col-md-6">
                              <input type="tel" name="phone" class="form-control" placeholder="Phone Number" required>
                           </div>
                           <div class="col-md-6">
                              <input type="email" name="email" class="form-control" placeholder="Enter Email" required>
                           </div>
                           <div class="col-md-6">
                              <input type="text" name="add" class="form-control" placeholder="Address" required>
                           </div>
                           <div class="col-md-6">
                              <select name="role" id="role" class="form-select" style="height: fit-content;" required>
                                 <option value="" selected>Select Role</option>
                                 <option value="admin">admin</option>
                                 <option value="patient">patient</option>
                              </select>
                           </div>
                           <div class="col-md-6">
                              <input type="text" name="password" class="form-control" placeholder="password" required>
                           </div>
                           <div class="col-12 mt-5">
                              <button type="button" id="closeUserBtn" class="btn btn-secondary" data-bs-dismiss="modal"
                                 onclick="clearform()" style="margin-left: 60%;">Clear</button>
                              <button type="submit" id="newuser" class="btn btn-primary float-end">Add
                                 User</button>
                           </div>
                        </div>
                     </form>
                  </div>
               </div>
            </div>
         </div>
         <table class="studentTestTable" id="studentTestTable">
            <thead>
               <tr class="testTableRowHeader">
                  <th class="testTableHeaderStu">Name</th>
                  <th class="testTableHeaderStu">Age</th>
                  <th class="testTableHeaderStu">DOB</th>
                  <th class="testTableHeaderStu">Role</th>
                  <th class="testTableHeaderStu">Phone</th>
                  <th class="testTableHeaderStu">Email</th>
                  <th class="testTableHeaderStu">Address</th>
                  <th class="testTableHeaderStu">Delete</th>
                  <th class="testTableHeaderStu">Edit</th>
               </tr>
            </thead>

            <tbody id="admin-table-body">
            </tbody>
         </table>

      </div>


   </div>

   <script src="./js/admin.js"></script>
</body>

</html>
